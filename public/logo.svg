<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Glowing gradients -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle (subtle glass) -->
  <circle cx="50" cy="50" r="45" fill="rgba(15, 23, 42, 0.6)" stroke="url(#neonGrad)" stroke-width="2" filter="url(#glow)" />
  
  <!-- Camera lens outline -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="url(#neonGrad)" stroke-width="3" />
  
  <!-- Outer shutter blades (futuristic game look) -->
  <path d="M 50 15 L 60 30" stroke="url(#neonGrad)" stroke-width="2" stroke-linecap="round" />
  <path d="M 85 50 L 70 60" stroke="url(#neonGrad)" stroke-width="2" stroke-linecap="round" />
  <path d="M 50 85 L 40 70" stroke="url(#neonGrad)" stroke-width="2" stroke-linecap="round" />
  <path d="M 15 50 L 30 40" stroke="url(#neonGrad)" stroke-width="2" stroke-linecap="round" />

  <!-- Sparkling AI highlights -->
  <path d="M 68 25 L 70 32 L 77 34 L 70 36 L 68 43 L 66 36 L 59 34 L 66 32 Z" fill="#ffffff" filter="url(#glow)" />
  <path d="M 30 68 L 31 72 L 35 73 L 31 74 L 30 78 L 29 74 L 25 73 L 29 72 Z" fill="#a855f7" filter="url(#glow)" />
</svg>
